<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Redline icon: a line of copy with a bold red strikethrough (an edit). -->
  <rect x="0" y="0" width="128" height="128" rx="27" fill="#FFFFFF"/>
  <!-- lines of text -->
  <g fill="#AEB4BD">
    <rect x="28" y="26.5" width="72" height="15" rx="7.5"/>
    <rect x="28" y="56.5" width="72" height="15" rx="7.5"/>
    <rect x="28" y="86.5" width="46" height="15" rx="7.5"/>
  </g>
  <!-- the redline: strikes through the middle line and extends past it -->
  <rect x="18" y="55.5" width="92" height="17" rx="8.5" fill="#E23B33"/>
</svg>
