<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Copy Edit</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <div id="app">
    <!-- ============================== Toolbar ============================== -->
    <header class="bar">
      <div class="brand">
        <span class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9" />
            <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z" />
          </svg>
        </span>
        <span class="name">Copy&nbsp;Edit</span>
        <span id="status" class="status">—</span>
      </div>

      <div class="actions">
        <button id="export" class="act" title="Download the whole-site session & copy it to the clipboard">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
          Export
        </button>
        <button id="import" class="act" title="Apply a session file">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
          Import
        </button>
        <button id="clear" class="act ghost" title="Clear all saved changes for this site">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          Clear
        </button>
      </div>
    </header>

    <!-- ============================== Content ============================== -->
    <main id="list" class="list"></main>

    <!-- States -->
    <div id="empty" class="state" hidden>
      <div class="state-art">✎</div>
      <p class="state-title">No changes yet</p>
      <p class="state-sub">Click any text on the page and start typing. Edits are saved per site and reappear as you browse.</p>
    </div>
    <div id="blocked" class="state" hidden>
      <div class="state-art">⊘</div>
      <p class="state-title">Can't run here</p>
      <p id="blocked-msg" class="state-sub"></p>
    </div>
  </div>

  <!-- Drag-and-drop overlay -->
  <div id="drop" class="drop" hidden><div class="drop-box">Drop a <u>.copyedit-session.json</u> to apply</div></div>

  <!-- Toasts -->
  <div id="toasts" class="toasts"></div>

  <!-- Hidden file picker for Import -->
  <input id="file" type="file" accept=".json,application/json" hidden />

  <script src="sidepanel.js"></script>
</body>
</html>
