name: Release

# Publishes Redline to the Chrome Web Store.
#
# Trigger: a push to `main` that changes the "version" field in package.json.
# The Chrome Web Store rejects re-uploads of an already-published version, so
# this workflow only submits when the version actually changes. Bump the
# version (e.g. `npm version patch --no-git-tag-version` or edit package.json),
# commit, and push — CI does the rest.
#
# You can also run it manually from the Actions tab with "Run workflow", where
# a dry-run option is available to verify credentials without submitting.

on:
  push:
    branches: [main]
    paths:
      - package.json
  workflow_dispatch:
    inputs:
      dryRun:
        description: Dry run (check auth, do not submit for review)
        type: boolean
        default: false

# Never run two publishes at once.
concurrency:
  group: chrome-web-store-release
  cancel-in-progress: false

jobs:
  check-version:
    name: Check version bump
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Compare package.json version with previous commit
        id: check
        run: |
          NEW=$(jq -r .version package.json)
          OLD=$(git show HEAD~1:package.json 2>/dev/null | jq -r .version 2>/dev/null || echo "")
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          if [ "$NEW" != "$OLD" ]; then
            echo "Version changed: $OLD -> $NEW"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version unchanged ($NEW) — nothing to publish"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  submit:
    name: Submit to Chrome Web Store
    needs: check-version
    # Run on manual dispatch, or on push only when the version changed.
    if: ${{ github.event_name == 'workflow_dispatch' || needs.check-version.outputs.changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run compile

      - name: Build & zip (Chrome)
        run: bun run zip

      - name: Submit for review (and auto-publish once approved)
        run: bunx wxt submit --chrome-zip .output/*-chrome.zip
        env:
          # `wxt submit` reads DRY_RUN from the env; true only on manual dry runs.
          DRY_RUN: ${{ inputs.dryRun || false }}
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}

      - name: Upload zip artifact
        if: ${{ !inputs.dryRun }}
        uses: actions/upload-artifact@v4
        with:
          name: redline-${{ needs.check-version.outputs.version }}-chrome
          path: .output/*-chrome.zip
          if-no-files-found: error
